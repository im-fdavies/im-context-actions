name: Context Update

on:
  push:
    branches: ['**']

permissions:
  contents: write

jobs:
  update-context:
    runs-on: ubuntu-latest

    # Skip if:
    # - Push is from github-actions[bot]
    # - Commit message contains [skip ci]
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CONTEXT_STANDARDS_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Run context update
        id: context_update
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CONTEXT_STANDARDS_PAT: ${{ secrets.CONTEXT_STANDARDS_PAT }}
          # AI provider keys - action reads config to determine which to use
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        working-directory: .github/scripts
        run: node context-update.js

      - name: Summary
        if: always()
        run: |
          echo "### Context Update Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Files checked:** ${{ steps.context_update.outputs.files_checked || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files regenerated:** ${{ steps.context_update.outputs.files_regenerated || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files skipped:** ${{ steps.context_update.outputs.files_skipped || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Errors:** ${{ steps.context_update.outputs.errors || '0' }}" >> $GITHUB_STEP_SUMMARY
