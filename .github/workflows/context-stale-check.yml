name: Context Stale Check

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  stale-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CONTEXT_STANDARDS_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Run stale check
        id: stale_check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CONTEXT_STANDARDS_PAT: ${{ secrets.CONTEXT_STANDARDS_PAT }}
          # AI provider keys - action reads config to determine which to use
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        working-directory: .github/scripts
        run: node stale-check.js

      - name: Summary
        if: always()
        run: |
          echo "### Context Stale Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Files checked:** ${{ steps.stale_check.outputs.files_checked || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files refreshed:** ${{ steps.stale_check.outputs.files_refreshed || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files flagged:** ${{ steps.stale_check.outputs.files_flagged || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Errors:** ${{ steps.stale_check.outputs.errors || '0' }}" >> $GITHUB_STEP_SUMMARY
