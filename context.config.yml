# context.config.yml
# Place this file at the root of your service repo.
# Controls how the context update action behaves for this specific repo.
# This file is copied and patched per-repo by setup_context_action.

context:
  # -----------------------------------------------------------------------
  # CONTEXT STANDARDS REPO
  # Where to find taxonomy.yaml for tag validation.
  # Patched by setup_context_action with your org name.
  # -----------------------------------------------------------------------
  standards_repo: org/context-standards

  # -----------------------------------------------------------------------
  # TRIGGER BRANCHES
  # Which branches trigger a context update on push.
  # Patched by setup_context_action based on your repo's default branch.
  # -----------------------------------------------------------------------
  trigger_branches:
    - main

  # -----------------------------------------------------------------------
  # STALE CHECK
  # How many days before a context file is considered stale and
  # queued for a re-verification pass against the current codebase.
  # -----------------------------------------------------------------------
  stale_threshold_days: 90

  # -----------------------------------------------------------------------
  # AI PROVIDER CONFIG
  # provider: openai | anthropic | azure-openai
  # model: the model string for that provider
  # api_key_secret: the name of the GitHub secret containing the API key
  #
  # Default is OpenAI (gpt-4o) for GitHub Copilot compatibility.
  # Set to anthropic with claude-sonnet-4-6 if you have an Anthropic key.
  # -----------------------------------------------------------------------
  ai:
    provider: openai
    model: gpt-4o
    api_key_secret: OPENAI_API_KEY
